services:
  - type: web
    name: expense-tracker-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn tracker.wsgi:application"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
